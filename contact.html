<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<header>

<h1 class="logo">TurboAI</h1>

<nav>

<a href="index.html">Home</a>
<a href="services.html">Services</a>
<a href="portfolio.html">Portfolio</a>
<a href="contact.html">Contact</a>

</nav>

</header>

<section class="contact">

<h2>Start Your Project</h2>

<form id="contactForm">

<input type="text" id="name" placeholder="Your Name" required>

<input type="email" id="email" placeholder="Your Email" required>

<select id="service">

<option>Website Development</option>
<option>AI Chatbot</option>
<option>Mobile App</option>
<option>Website Fix</option>

</select>

<textarea id="message" placeholder="Describe your project"></textarea>

<button type="submit">Send Request</button>

</form>

<p id="status"></p>

</section>

<script>
const supabaseClient = supabase.createClient(
  "https://djigbnajjyvjtqryemyz.supabase.co",  
  "sb_publishable_aweqq2_RPJF_0uLgD_Mcag_OOgi2vbL" 
);

const form = document.getElementById("contactForm");

form.addEventListener("submit", async function(e) {
  e.preventDefault();

  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const serviceValue = document.getElementById("service").value; 
  const message = document.getElementById("message").value;

  const { error } = await supabaseClient
    .from("requests")
    .insert([{ name, email, services: serviceValue, message }]);
  if (error) {
    document.getElementById("status").innerText = "Error sending request: " + error.message;
  } else {
    document.getElementById("status").innerText = "Request sent successfully!";
    form.reset();
  }
});
</script>

</body>
</html>
